<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Video Generator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input, select, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 12px;
      width: 100%;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <h1>🎬 AI Video Generator</h1>

  <div class="box">
    <textarea placeholder="Masukkan prompt video..."></textarea>

    <select>
      <option>720p</option>
      <option>1080p</option>
    </select>

    <select>
      <option>2 detik</option>
      <option>4 detik</option>
      <option>6 detik</option>
      <option>8 detik</option>
      <option>10 detik</option>
      <option>12 detik</option>
    </select>

    <button onclick="goToOpal()">Generate Video</button>
  </div>

  <script>
    function goToOpal() {
      window.open("https://opal.google/app/1P68W9NQi0TIBDy_vl02kyhav5BuLUnD9", "_blank");
    }
  </script>

</body>
</html>
